<!doctype html><html><head><meta charset="utf-8"><style>
  body{margin:0;background:#EFEAE1;font-family:-apple-system,Helvetica,sans-serif;color:#15243B;padding:40px}
  h1{font-size:20px;font-weight:600}
  .row{display:flex;align-items:flex-end;gap:40px;margin:28px 0 40px}
  .item{text-align:center}
  .cap{margin-top:10px;font-size:13px;color:#6b7280}
  /* iOS applies a superellipse ~22.4% corner radius */
  img{border-radius:22.4%;display:block;box-shadow:0 8px 24px rgba(0,0,0,.15)}
  .home{background:#c9d6e8;padding:24px;border-radius:20px;display:inline-flex;gap:22px;align-items:center}
  .home .label{font-size:11px;margin-top:6px;color:#15243B}
</style></head><body>
  <h1>Camino app icon — brand mark preview</h1>
  <div class="row">
    <div class="item"><img src="icon-preview.png" width="240" height="240"><div class="cap">240px</div></div>
    <div class="item"><img src="icon-preview.png" width="120" height="120"><div class="cap">120px (app store)</div></div>
    <div class="item"><img src="icon-preview.png" width="60" height="60"><div class="cap">60px (home screen)</div></div>
    <div class="item"><img src="icon-preview.png" width="40" height="40"><div class="cap">40px (settings)</div></div>
  </div>
  <h1 style="font-size:15px">On a home screen</h1>
  <div class="home">
    <div class="item"><img src="icon-preview.png" width="60" height="60"><div class="label">Camino</div></div>
    <div class="item"><img src="icon-preview.png" width="60" height="60" style="filter:grayscale(1) opacity(.5)"><div class="label">Photos</div></div>
    <div class="item"><img src="icon-preview.png" width="60" height="60" style="filter:grayscale(1) opacity(.5)"><div class="label">Maps</div></div>
  </div>
</body></html>
