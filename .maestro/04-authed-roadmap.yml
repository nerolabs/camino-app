# P0 authed: sign in by opening the caminoapp:// deep link directly (AUTH_LINK is the
# post-verify redirect captured server-side by scripts/e2e/seed.mjs — access+refresh tokens
# in the fragment), then the seeded roadmap renders and a step sheet opens.
#
# Why a deep link, not the https magic link: opening the https link routes through Safari,
# which raises an "Open in 'Get Camino'?" SpringBoard alert. That alert is NOT in the app's
# accessibility tree, so Maestro can neither see nor reliably tap it (runs 2 & 3 both died
# there). Opening the custom scheme directly hands the URL straight to the app's deep-link
# handler (completeSessionFromUrl → setSession) — the same code path, no browser, no dialog.
appId: ${APP_ID}
---
- launchApp:
    clearState: true
- openLink: ${AUTH_LINK}
- extendedWaitUntil:
    visible: "My roadmap"
    timeout: 45000
- tapOn: "My roadmap"
- extendedWaitUntil:
    visible: "Your roadmap"
    timeout: 30000
- assertVisible: "Obtain your NIE.*"
- tapOn: "Obtain your NIE.*"
- extendedWaitUntil:
    visible: ".*Mark done"
    timeout: 15000
