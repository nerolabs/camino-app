# Authed roadmap via the caminoapp:// deep link (AUTH_LINK = the post-verify redirect captured
# server-side by scripts/e2e/seed.mjs). Uses Maestro's DOCUMENTED iOS pattern for the
# "Open in 'Get Camino'?" SpringBoard confirmation.
#
# ⚠️ TAGGED `authed` AND EXCLUDED FROM CI (see .github/workflows/e2e-ios.yml). Reason:
# opening iOS deep links via Maestro on GitHub macOS runners is a documented, unresolved
# flake — the "Open in app" alert isn't in the app's accessibility tree on Maestro 2.x /
# iOS 18.x, so it can't be tapped (Maestro issue #2610; confirmed live in our runs 2–4).
# This exact journey (saved roadmap → This-week → mark-done → re-model → sign-out) is fully
# covered by the 12 authed PLAYWRIGHT web tests against the same React components, and native
# deep-link sign-in is manually verified on-device every build. Kept here, runnable LOCALLY on
# a Maestro version where the dialog pattern works; re-fold into CI when #2610 is fixed or we
# pin a known-good Maestro. Do NOT add coordinate taps — that's brute-forcing a tool bug.
appId: ${APP_ID}
tags:
  - authed
---
- launchApp:
    clearState: true
- openLink: ${AUTH_LINK}
# Documented Maestro handling for the iOS scheme-confirmation alert (per-simulator permanent).
- runFlow:
    when:
      visible: 'Open in "Get Camino"'
    commands:
      - tapOn: Open
- extendedWaitUntil:
    visible: "My roadmap"
    timeout: 45000
- tapOn: "My roadmap"
- extendedWaitUntil:
    visible: "Your roadmap"
    timeout: 30000
- assertVisible: "Obtain your NIE.*"
- tapOn: "Obtain your NIE.*"
- extendedWaitUntil:
    visible: ".*Mark done"
    timeout: 15000
