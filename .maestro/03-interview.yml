# P0: the interview auto-starts and accepts a native-typed answer. Proves the native-critical
# path: launch → navigate → the interview opens straight into the conversation (greeting + the
# arrival-date opener). Since the 2026-07-10 living-roadmap redesign the opener is STATIC copy —
# no LLM round-trip is needed to see Question 1, so this flow is now fully deterministic up to
# the send. We still deliberately DON'T assert "Question 2 appears" (that needs a live extraction
# under CI latency — same scoping as before); the user's own message posting proves the send path.
appId: ${APP_ID}
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Build my free roadmap.*"
    timeout: 45000
- tapOn: "Build my free roadmap.*"
- extendedWaitUntil:
    visible: "Hola, I'm Lola.*"        # the greeting bubble — the interview auto-started
    timeout: 20000
- extendedWaitUntil:
    visible: ".*when are you planning to arrive.*"   # the arrival opener (deterministic static copy)
    timeout: 20000
- tapOn: "Type your answer.*"
- waitForAnimationToEnd:
    timeout: 4000
- inputText: "January 2028"
- assertVisible: "January 2028"        # native keyboard input landed (Send now enabled)
- tapOn: "Send your answer"
- extendedWaitUntil:
    visible: "January 2028"            # the answer posted to the conversation (send worked)
    timeout: 20000
