# P0: the interview starts and accepts a native-typed answer. Proves the native-critical path:
# launch → navigate → a real /api/lola turn phrases Question 1 → the native keyboard types an
# answer that lands → send posts it (the user's message appears in the conversation).
#
# Scoping note (runs #6–#9): we deliberately DON'T assert "Question 2 appears". That step needs a
# SECOND sequential live LLM call (extract + phrase), and under CI latency it's genuinely
# nondeterministic — flow 03 failed BOTH retry attempts in run #9 on exactly that wait, while
# everything up to the answer-sent was solid. Same principle as excluding the deep-link flow: a
# gate must not hinge on two back-to-back LLM round-trips. The "answering advances to the next
# question" logic is identical to web (extractAnswer/phraseQuestion), covered by manual testing
# every build + the planned full-interview Playwright flow (docs/TEST-COVERAGE.md §4B). Anchors on
# the deterministic progress label + the user's own message, never on Lola's LLM wording.
appId: ${APP_ID}
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Build my free roadmap.*"
    timeout: 45000
- tapOn: "Build my free roadmap.*"
- extendedWaitUntil:
    visible: "Hola, I'm Lola.*"
    timeout: 20000
- tapOn: "Let's get started"
- extendedWaitUntil:
    visible: "Question 1 of.*"     # a real /api/lola turn phrased question 1
    timeout: 90000
- tapOn: "Type your answer.*"
- waitForAnimationToEnd:
    timeout: 4000
- inputText: "I'm a US citizen"
- assertVisible: "I'm a US citizen"   # native keyboard input landed (Send now enabled)
- tapOn: "Send your answer"
- extendedWaitUntil:
    visible: "I'm a US citizen"        # the answer posted to the conversation (send worked)
    timeout: 20000
